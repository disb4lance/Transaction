version: '3.8'

name: transaction-service

services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: transaction-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - transaction-network
    env_file:
      - .env.docker

  # Redis
  redis:
    image: redis:7-alpine
    container_name: transaction-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - transaction-network
    env_file:
      - .env.docker

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transaction-app
    ports:
      - "${API_PORT}:8081"  # 8081 наружу, 8081 внутри контейнера
    environment:
      # App
      APP_ENV: docker
      API_PORT: 8081
      API_HOST: 0.0.0.0
      
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_SSLMODE: disable
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      
      # Kafka
      KAFKA_BROKERS: kafka:9092
      KAFKA_CREATED_TOPIC: ${KAFKA_CREATED_TOPIC}
      KAFKA_UPDATED_TOPIC: ${KAFKA_UPDATED_TOPIC}
      KAFKA_DELETED_TOPIC: ${KAFKA_DELETED_TOPIC}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - transaction-network
    env_file:
      - .env.docker

networks:
  transaction-network:
    driver: bridge

volumes:
  postgres_data:
    name: transaction-postgres-data
  redis_data:
    name: transaction-redis-data