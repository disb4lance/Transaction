basePath: /api/v1
definitions:
  dto.CategoryRequest:
    properties:
      description:
        maxLength: 500
        type: string
      name:
        maxLength: 20
        minLength: 2
        type: string
    required:
    - name
    type: object
  dto.CategoryResponse:
    properties:
      description:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  dto.TransactionRequest:
    properties:
      amount:
        type: number
      category_id:
        type: string
      name:
        maxLength: 20
        minLength: 2
        type: string
    required:
    - name
    type: object
  dto.TransactionResponse:
    properties:
      amount:
        type: number
      category_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      user_id:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API для управления личными финансами
  title: Finance Tracker API
  version: "1.0"
paths:
  /categories:
    get:
      consumes:
      - application/json
      description: Возвращает список всех доступных категорий
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.CategoryResponse'
            type: array
        "500":
          description: internal server error
          schema:
            type: string
      summary: Получить все категории
      tags:
      - categories
    post:
      consumes:
      - application/json
      description: Создает новую категорию для транзакций
      parameters:
      - description: Данные категории
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CategoryResponse'
        "400":
          description: invalid body
          schema:
            type: string
      summary: Создание новой категории
      tags:
      - categories
  /categories/{id}:
    get:
      consumes:
      - application/json
      description: Возвращает информацию о категории по её идентификатору
      parameters:
      - description: ID категории (UUID)
        in: query
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CategoryResponse'
        "400":
          description: invalid ID format
          schema:
            type: string
        "404":
          description: category not found
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      summary: Получить категорию по ID
      tags:
      - categories
  /transactions:
    post:
      consumes:
      - application/json
      description: Создает новую транзакцию
      parameters:
      - description: Данные транзакции
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.TransactionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.TransactionResponse'
        "400":
          description: invalid body
          schema:
            type: string
      summary: Создание новой транзакции
      tags:
      - transactions
swagger: "2.0"
