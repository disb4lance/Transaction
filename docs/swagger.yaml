basePath: /api/v1
definitions:
  dto.CategoryRequest:
    properties:
      description:
        maxLength: 500
        type: string
      name:
        maxLength: 20
        minLength: 2
        type: string
    required:
    - name
    type: object
  dto.CategoryResponse:
    properties:
      description:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  dto.EditTransactionRequest:
    properties:
      amount:
        type: number
      category_id:
        type: string
      name:
        maxLength: 20
        minLength: 2
        type: string
    required:
    - name
    type: object
  dto.TransactionRequest:
    properties:
      amount:
        type: number
      category_id:
        type: string
      name:
        maxLength: 20
        minLength: 2
        type: string
    required:
    - name
    type: object
  dto.TransactionResponse:
    properties:
      amount:
        type: number
      category_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      user_id:
        type: string
    type: object
host: localhost:8081
info:
  contact: {}
  description: API для управления личными финансами
  title: Finance Tracker API
  version: "1.0"
paths:
  /categories:
    get:
      consumes:
      - application/json
      description: Возвращает список всех доступных категорий
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.CategoryResponse'
            type: array
        "500":
          description: internal server error
          schema:
            type: string
      summary: Получить все категории
      tags:
      - categories
    post:
      consumes:
      - application/json
      description: Создает новую категорию для транзакций
      parameters:
      - description: Данные категории
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CategoryResponse'
        "400":
          description: invalid body
          schema:
            type: string
      summary: Создание новой категории
      tags:
      - categories
  /categories/{id}:
    get:
      consumes:
      - application/json
      description: Возвращает информацию о категории по её идентификатору
      parameters:
      - description: ID категории (UUID)
        in: query
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CategoryResponse'
        "400":
          description: invalid ID format
          schema:
            type: string
        "404":
          description: category not found
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      summary: Получить категорию по ID
      tags:
      - categories
  /transactions:
    get:
      consumes:
      - application/json
      description: Возвращает список всех транзакций пользователя
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.TransactionResponse'
            type: array
        "401":
          description: unauthorized
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить все транзакции пользователя
      tags:
      - transactions
    post:
      consumes:
      - application/json
      description: Создает новую транзакцию
      parameters:
      - description: Данные транзакции
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.TransactionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.TransactionResponse'
        "400":
          description: invalid body
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Создание новой транзакции
      tags:
      - transactions
  /transactions/{id}:
    delete:
      consumes:
      - application/json
      description: Удаляет существующую транзакцию по ID
      parameters:
      - description: ID транзакции (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content - транзакция успешно удалена
        "400":
          description: invalid transaction id
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "404":
          description: transaction not found
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Удаление транзакции
      tags:
      - transactions
    get:
      consumes:
      - application/json
      description: Возвращает информацию о транзакции по её идентификатору
      parameters:
      - description: ID транзакции (UUID)
        in: query
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TransactionResponse'
        "400":
          description: invalid ID format
          schema:
            type: string
        "404":
          description: category not found
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить тразакцию по ID
      tags:
      - transactions
    put:
      consumes:
      - application/json
      description: Обновляет существующую транзакцию по ID
      parameters:
      - description: ID транзакции
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Данные для обновления
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.EditTransactionRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content - транзакция успешно обновлена
        "400":
          description: invalid request
          schema:
            type: string
        "404":
          description: transaction not found
          schema:
            type: string
        "500":
          description: internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Обновление транзакции
      tags:
      - transactions
securityDefinitions:
  BearerAuth:
    description: Введите ваш JWT токен без префикса "Bearer"
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
